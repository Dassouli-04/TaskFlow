<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow - Tâches</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <h2>TaskFlow</h2>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="projects.html">Projets</a>
      <button id="logoutBtn">Déconnexion</button>
    </div>
  </nav>

  <main class="container">
    <h1 id="projectTitle">Tâches du projet</h1>

    <section class="card">
      <h2 id="taskFormTitle">Créer une tâche</h2>

      <form id="taskForm">
        <input type="hidden" id="taskId">

        <input type="text" id="taskTitle" placeholder="Titre de la tâche" required>

        <textarea id="taskDescription" placeholder="Description (optionnelle)"></textarea>

        <label for="taskPriority">Priorité</label>
        <select id="taskPriority">
          <option value="basse">Basse</option>
          <option value="moyenne" selected>Moyenne</option>
          <option value="haute">Haute</option>
        </select>

        <label for="taskStatus">Statut</label>
        <select id="taskStatus">
          <option value="à faire" selected>À faire</option>
          <option value="en cours">En cours</option>
          <option value="terminé">Terminé</option>
        </select>

        <label for="taskDeadline">Date limite (optionnelle)</label>
        <input type="date" id="taskDeadline">

        <button type="submit" id="submitTaskBtn">Créer la tâche</button>
        <button type="button" id="cancelTaskBtn" style="display:none;">Annuler</button>
      </form>

      <p id="taskMessage"></p>
    </section>

    <section class="card">
      <h2>Liste des tâches</h2>

      <div id="tasksList"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tasks.js"></script>
</body>
</html>
