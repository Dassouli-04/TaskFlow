<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <h2>TaskFlow</h2>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="container">
    <h1>Dashboard</h1>
    <p id="welcomeMessage">Loading...</p>

    <a href="projects.html">Go to projects</a>
<section class="card">
  <h2>My assigned tasks</h2>
  <div id="assignedTasksList"></div>
</section>
<section class="dashboard-grid">
    <div class="card metric-card">
      <h3>Active projects</h3>
      <p id="activeProjectsCount">0</p>
    </div>

    <div class="card metric-card">
      <h3>Assigned tasks</h3>
      <p id="assignedTasksCount">0</p>
    </div>

    <div class="card metric-card">
      <h3>Completed tasks</h3>
      <p id="completedTasksCount">0</p>
    </div>

    <div class="card metric-card">
      <h3>Late tasks</h3>
      <p id="lateTasksCount">0</p>
    </div>
  </section>

  <section class="card">
    <h2>Current tasks</h2>
    <div id="currentTasksList"></div>
  </section>

  <a href="projects.html">Go to projects</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
