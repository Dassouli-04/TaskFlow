<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <h2>TaskFlow</h2>
    <button id="logoutBtn">Logout</button>
  </nav>

  <main class="container">
    <h1>Dashboard</h1>
    <p id="welcomeMessage">Loading...</p>

    <a href="projects.html">Go to projects</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
  async function loadDashboard() {
  try {
    const token = localStorage.getItem('token');
    const response = await axios.get('/api/dashboard', {
      headers: { Authorization: `Bearer ${token}` }
    });
    
    const data = response.data;
    
    document.getElementById('activeProjects').textContent = data.activeProjects;
    document.getElementById('totalAssigned').textContent = data.totalAssigned;
    document.getElementById('completedTasks').textContent = data.completedTasks;
    document.getElementById('lateTasks').textContent = data.lateTasks;
    
    displayPendingTasks(data.pendingTasks);
  } catch (error) {
    console.error('Error loading dashboard:', error);
  }
}

function displayPendingTasks(tasks) {
  const container = document.getElementById('pendingTasksList');
  if (!container) return;
  
  if (tasks.length === 0) {
    container.innerHTML = '<p>Aucune tâche en cours.</p>';
    return;
  }
  
  container.innerHTML = tasks.map(task => `
    <div class="task-item">
      <strong>${escapeHtml(task.title)}</strong>
      <span class="priority ${task.priority}">${task.priority}</span>
      <span class="status">${task.status}</span>
      ${task.deadline ? `<small>Deadline: ${new Date(task.deadline).toLocaleDateString()}</small>` : ''}
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
