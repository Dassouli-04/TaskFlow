<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow - Projects</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <h2>TaskFlow</h2>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <main class="container">
    <h1>Projects</h1>

    <section class="card">
      <h2>Create project</h2>

      <form id="projectForm">
        <input type="hidden" id="projectId">

        <input type="text" id="title" placeholder="Project title" required>

        <textarea id="description" placeholder="Project description" required></textarea>

        <input type="date" id="deadline">

        <select id="status">
          <option value="actif">Actif</option>
          <option value="en pause">En pause</option>
          <option value="archivé">Archivé</option>
        </select>

        <button type="submit" id="submitProjectBtn">Create project</button>
      </form>

      <p id="projectMessage"></p>
    </section>

    <section class="card">
      <h2>My projects</h2>

      <div id="projectsList"></div>

      <div class="pagination">
        <button id="prevPageBtn">Previous</button>
        <span id="pageInfo"></span>
        <button id="nextPageBtn">Next</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
